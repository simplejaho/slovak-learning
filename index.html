<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slovak Learning</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <header>
    <h1>🇸🇰 Slovak Learning</h1>
  </header>

  <div class="main-content">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div id="nav-tree"></div>
    </aside>

    <!-- Lesson Area -->
    <div class="lesson-area">

      <!-- Rules Panel -->
      <div id="rules" class="rules-panel">
        <p>Select a lesson from the sidebar</p>
      </div>

      <!-- Vocabulary Panel -->
      <div id="vocab" class="vocab-panel">
        <input type="text" id="vocab-search" placeholder="Search vocabulary..." />
        <table id="vocab-table">
          <thead>
            <tr>
              <th>Slovak</th>
              <th>English</th>
            </tr>
          </thead>
          <tbody>
            <!-- dynamically filled -->
          </tbody>
        </table>
      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
